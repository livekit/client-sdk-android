name: Pinact update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
  schedule:
    # Weekly on Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  pinact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run pinact (update workflow files)
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          # Requires repo and workflow:write access to modify workflow files.
          github_token: ${{ secrets.PINACT_GITHUB_TOKEN }}
          update: "true"
          min_age: "30"
