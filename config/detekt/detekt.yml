# Detekt: smell-oriented checks only. Formatting and naming conventions are handled by Spotless/ktlint.
config:
  validation: true
  warningsAsErrors: true
  excludes: ''

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true

style:
  active: false

naming:
  active: false

coroutines:
  SuspendFunSwallowedCancellation:
    active: true

livekit-rules:
  NoWithTimeout:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: false
    
complexity:
  LongMethod:
    active: true
    allowedLines: 120
